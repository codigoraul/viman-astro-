name: Deploy to viman.cl/prueba

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [wordpress_update]

concurrency:
  group: deploy-prueba
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          ASTRO_BASE: /prueba
          WORDPRESS_API_URL: https://viman.cl/admin/wp-json/wp/v2

      - name: Deploy via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: prueba/
          protocol: ftps
          port: 21
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Esperar antes de reintentar
        if: steps.ftp_deploy.outcome == 'failure'
        run: sleep 60

      - name: Reintentar deploy via FTP
        if: steps.ftp_deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: prueba/
          protocol: ftps
          port: 21
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
